<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bgret1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F7F2"/>
      <stop offset="100%" style="stop-color:#C8EFE3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgret1)" rx="16"/>
  
  <!-- building -->
  <rect x="60" y="50" width="280" height="160" rx="8" fill="#fff" opacity=".7"/>
  <!-- roof accent -->
  <rect x="60" y="50" width="280" height="20" rx="8" fill="#008A66" opacity=".8"/>
  <rect x="60" y="62" width="280" height="8" fill="#008A66" opacity=".8"/>
  <!-- sign -->
  <rect x="110" y="70" width="180" height="30" rx="6" fill="#0A1F13" opacity=".8"/>
  <rect x="120" y="77" width="80" height="8" rx="3" fill="#34D399" opacity=".6"/>
  <rect x="210" y="77" width="50" height="8" rx="3" fill="#34D399" opacity=".4"/>
  <!-- door -->
  <rect x="170" y="150" width="60" height="60" rx="6" fill="#34D399" opacity=".5"/>
  <rect x="170" y="150" width="28" height="60" rx="6" fill="#34D399" opacity=".3"/>
  <circle cx="195" cy="182" r="4" fill="#0A1F13" opacity=".6"/>
  <circle cx="205" cy="182" r="4" fill="#0A1F13" opacity=".6"/>
  <!-- windows -->
  <rect x="80" y="110" width="70" height="50" rx="5" fill="#E6F7F2" opacity=".6"/>
  <rect x="250" y="110" width="70" height="50" rx="5" fill="#E6F7F2" opacity=".6"/>
  <!-- shelves in window -->
  <line x1="80" y1="128" x2="150" y2="128" stroke="#008A66" stroke-width="2" opacity=".4"/>
  <line x1="80" y1="144" x2="150" y2="144" stroke="#008A66" stroke-width="2" opacity=".4"/>
  <rect x="90" y="114" width="12" height="14" rx="2" fill="#34D399" opacity=".5"/>
  <rect x="108" y="118" width="12" height="10" rx="2" fill="#008A66" opacity=".4"/>
  <!-- ground -->
  <rect x="40" y="205" width="320" height="6" rx="3" fill="#008A66" opacity=".3"/>

</svg>