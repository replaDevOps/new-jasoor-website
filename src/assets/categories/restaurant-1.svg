  <path d="M200 88 Q204 76 200 64" fill="none" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
  <path d="M212 92 Q216 82 212 72" fill="none" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
  <!-- pastry -->
  <ellipse cx="290" cy="148" rx="28" ry="14" fill="#34D399" opacity=".7"/>
  <ellipse cx="290" cy="144" rx="22" ry="10" fill="#fff" opacity=".5"/>
  <!-- small cup -->
