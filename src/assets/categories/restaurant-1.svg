      <stop offset="0%" style="stop-color:#E6F7F2"/>
      <stop offset="100%" style="stop-color:#C8EFE3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgr1)" rx="16"/>
  
  <!-- table surface -->
  <ellipse cx="200" cy="140" rx="140" ry="70" fill="#fff" opacity=".6"/>
  <!-- saucer -->
  <ellipse cx="200" cy="145" rx="55" ry="20" fill="#C8EFE3"/>
