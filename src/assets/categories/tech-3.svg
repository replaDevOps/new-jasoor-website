<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bgtech3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F7F2"/>
      <stop offset="100%" style="stop-color:#C8EFE3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgtech3)" rx="16"/>
  
  <!-- dashboard / chart screen -->
  <rect x="40" y="40" width="320" height="180" rx="14" fill="#0A1F13" opacity=".8"/>
  <rect x="48" y="48" width="304" height="164" rx="10" fill="#0F2E1E"/>
  <!-- top bar -->
  <rect x="48" y="48" width="304" height="24" rx="10" fill="#0A1F13"/>
  <circle cx="64" cy="60" r="5" fill="#34D399" opacity=".5"/>
  <circle cx="80" cy="60" r="5" fill="#008A66" opacity=".5"/>
  <circle cx="96" cy="60" r="5" fill="#34D399" opacity=".3"/>
  <rect x="200" y="55" width="100" height="10" rx="3" fill="#34D399" opacity=".2"/>
  <!-- line chart -->
  <polyline points="60,180 90,150 130,165 170,120 210,130 250,95 290,110 330,75" fill="none" stroke="#34D399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/>
  <!-- area under line -->
  <polygon points="60,180 90,150 130,165 170,120 210,130 250,95 290,110 330,75 330,190 60,190" fill="#34D399" opacity=".08"/>
  <!-- dots on line -->
  <circle cx="170" cy="120" r="5" fill="#34D399" opacity=".9"/>
  <circle cx="250" cy="95" r="5" fill="#34D399" opacity=".9"/>
  <circle cx="330" cy="75" r="5" fill="#34D399" opacity=".9"/>
  <!-- grid lines -->
  <line x1="56" y1="150" x2="336" y2="150" stroke="#34D399" stroke-width="1" opacity=".1"/>
  <line x1="56" y1="120" x2="336" y2="120" stroke="#34D399" stroke-width="1" opacity=".1"/>
  <line x1="56" y1="90" x2="336" y2="90" stroke="#34D399" stroke-width="1" opacity=".1"/>
  <!-- bar chart mini -->
  <rect x="60" y="155" width="14" height="25" rx="3" fill="#008A66" opacity=".6"/>
  <rect x="78" y="145" width="14" height="35" rx="3" fill="#008A66" opacity=".5"/>
  <rect x="96" y="158" width="14" height="22" rx="3" fill="#008A66" opacity=".4"/>

</svg>