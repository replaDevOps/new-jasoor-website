<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bgedu3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F7F2"/>
      <stop offset="100%" style="stop-color:#C8EFE3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgedu3)" rx="16"/>
  
  <!-- graduation cap -->
  <polygon points="200,50 320,100 200,120 80,100" fill="#0A1F13" opacity=".8"/>
  <polygon points="200,50 320,100 200,120 80,100" fill="#008A66" opacity=".2"/>
  <!-- cap top -->
  <rect x="160" y="42" width="80" height="16" rx="4" fill="#0A1F13" opacity=".6"/>
  <!-- tassel string -->
  <line x1="320" y1="100" x2="320" y2="150" stroke="#34D399" stroke-width="3" stroke-linecap="round" opacity=".7"/>
  <circle cx="320" cy="155" r="8" fill="#34D399" opacity=".6"/>
  <!-- diploma scroll -->
  <rect x="100" y="145" width="200" height="75" rx="8" fill="#fff" opacity=".6"/>
  <rect x="108" y="153" width="184" height="59" rx="5" fill="#E6F7F2" opacity=".5"/>
  <!-- diploma lines -->
  <rect x="120" y="162" width="120" height="6" rx="2" fill="#0A1F13" opacity=".2"/>
  <rect x="130" y="174" width="100" height="6" rx="2" fill="#0A1F13" opacity=".15"/>
  <rect x="125" y="186" width="110" height="6" rx="2" fill="#0A1F13" opacity=".15"/>
  <!-- ribbon -->
  <rect x="188" y="143" width="24" height="80" rx="4" fill="#008A66" opacity=".25"/>
  <!-- stars -->
  <text x="165" y="215" font-size="16" fill="#34D399" opacity=".5">★</text>
  <text x="210" y="215" font-size="16" fill="#008A66" opacity=".5">★</text>
  <text x="255" y="215" font-size="16" fill="#34D399" opacity=".4">★</text>

</svg>