<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bgecom3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FBF7"/>
      <stop offset="100%" style="stop-color:#C8EFE3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgecom3)" rx="16"/>
  
  <!-- packages / boxes -->
  <!-- box 1 big -->
  <rect x="50" y="90" width="110" height="110" rx="8" fill="#008A66" opacity=".75"/>
  <rect x="56" y="96" width="98" height="98" rx="5" fill="#008A66" opacity=".6"/>
  <!-- box tape -->
  <line x1="105" y1="90" x2="105" y2="200" stroke="#34D399" stroke-width="5" opacity=".5"/>
  <line x1="50" y1="145" x2="160" y2="145" stroke="#34D399" stroke-width="5" opacity=".5"/>
  <!-- box label -->
  <rect x="66" y="155" width="60" height="30" rx="4" fill="#fff" opacity=".3"/>
  <!-- box 2 medium -->
  <rect x="170" y="120" width="90" height="90" rx="8" fill="#34D399" opacity=".65"/>
  <line x1="215" y1="120" x2="215" y2="210" stroke="#008A66" stroke-width="4" opacity=".4"/>
  <line x1="170" y1="165" x2="260" y2="165" stroke="#008A66" stroke-width="4" opacity=".4"/>
  <!-- box 3 small -->
  <rect x="270" y="145" width="70" height="70" rx="7" fill="#0A1F13" opacity=".5"/>
  <line x1="305" y1="145" x2="305" y2="215" stroke="#34D399" stroke-width="3" opacity=".4"/>
  <!-- arrow up (delivery) -->
  <path d="M320 70 L320 40 M320 40 L305 55 M320 40 L335 55" fill="none" stroke="#008A66" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".6"/>
  <!-- stars -->
  <text x="60" y="80" font-size="18" fill="#34D399" opacity=".4">✦</text>
  <text x="340" y="110" font-size="14" fill="#008A66" opacity=".3">✦</text>

</svg>