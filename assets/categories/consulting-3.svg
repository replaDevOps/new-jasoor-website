<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bgcon3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F7F2"/>
      <stop offset="100%" style="stop-color:#C8EFE3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgcon3)" rx="16"/>
  
  <!-- handshake -->
  <!-- left hand -->
  <path d="M60 140 Q80 120 110 125 L160 130 Q175 132 180 145 Q185 158 170 162 L120 165 Q95 168 75 160 Z" fill="#34D399" opacity=".6"/>
  <!-- right hand -->
  <path d="M340 140 Q320 120 290 125 L240 130 Q225 132 220 145 Q215 158 230 162 L280 165 Q305 168 325 160 Z" fill="#008A66" opacity=".6"/>
  <!-- clasped center -->
  <ellipse cx="200" cy="148" rx="45" ry="25" fill="#0A1F13" opacity=".5"/>
  <ellipse cx="200" cy="146" rx="38" ry="20" fill="#34D399" opacity=".3"/>
  <!-- fingers -->
  <rect x="155" y="125" width="12" height="22" rx="5" fill="#34D399" opacity=".5" transform="rotate(-10,161,136)"/>
  <rect x="170" y="120" width="12" height="22" rx="5" fill="#34D399" opacity=".5" transform="rotate(-5,176,131)"/>
  <rect x="220" y="120" width="12" height="22" rx="5" fill="#008A66" opacity=".5" transform="rotate(5,226,131)"/>
  <rect x="233" y="125" width="12" height="22" rx="5" fill="#008A66" opacity=".5" transform="rotate(10,239,136)"/>
  <!-- stars around -->
  <text x="80" y="100" font-size="20" fill="#34D399" opacity=".4">✦</text>
  <text x="300" y="98" font-size="20" fill="#008A66" opacity=".4">✦</text>
  <text x="190" y="80" font-size="16" fill="#34D399" opacity=".3">✦</text>
  <!-- deal text area -->
  <rect x="130" y="185" width="140" height="30" rx="8" fill="#008A66" opacity=".25"/>
  <rect x="148" y="193" width="80" height="8" rx="3" fill="#008A66" opacity=".35"/>

</svg>