<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bgre2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FBF7"/>
      <stop offset="100%" style="stop-color:#C8EFE3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgre2)" rx="16"/>
  
  <!-- villa / house -->
  <!-- ground -->
  <rect x="0" y="195" width="400" height="45" fill="#C8EFE3" opacity=".4"/>
  <!-- body -->
  <rect x="80" y="130" width="240" height="80" rx="6" fill="#fff" opacity=".6"/>
  <!-- roof -->
  <polygon points="60,130 200,50 340,130" fill="#008A66" opacity=".8"/>
  <polygon points="60,130 200,50 340,130" fill="#34D399" opacity=".15"/>
  <!-- chimney -->
  <rect x="240" y="60" width="22" height="50" rx="4" fill="#0A1F13" opacity=".5"/>
  <!-- windows -->
  <rect x="100" y="145" width="60" height="50" rx="5" fill="#E6F7F2" opacity=".5"/>
  <line x1="130" y1="145" x2="130" y2="195" stroke="#008A66" stroke-width="2" opacity=".3"/>
  <line x1="100" y1="170" x2="160" y2="170" stroke="#008A66" stroke-width="2" opacity=".3"/>
  <rect x="240" y="145" width="60" height="50" rx="5" fill="#E6F7F2" opacity=".5"/>
  <line x1="270" y1="145" x2="270" y2="195" stroke="#008A66" stroke-width="2" opacity=".3"/>
  <line x1="240" y1="170" x2="300" y2="170" stroke="#008A66" stroke-width="2" opacity=".3"/>
  <!-- door -->
  <rect x="170" y="158" width="60" height="52" rx="5" fill="#34D399" opacity=".4"/>
  <circle cx="224" cy="186" r="4" fill="#0A1F13" opacity=".5"/>
  <!-- path to door -->
  <rect x="185" y="195" width="30" height="10" rx="3" fill="#008A66" opacity=".2"/>
  <!-- trees -->
  <rect x="40" y="165" width="10" height="30" rx="3" fill="#0A1F13" opacity=".4"/>
  <circle cx="45" cy="155" r="20" fill="#008A66" opacity=".5"/>
  <rect x="350" y="165" width="10" height="30" rx="3" fill="#0A1F13" opacity=".4"/>
  <circle cx="355" cy="155" r="20" fill="#34D399" opacity=".5"/>

</svg>