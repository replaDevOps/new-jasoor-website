<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bgr2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FBF7"/>
      <stop offset="100%" style="stop-color:#C8EFE3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgr2)" rx="16"/>
  
  <!-- floor -->
  <rect x="0" y="160" width="400" height="80" fill="#C8EFE3" opacity=".5" rx="0"/>
  <!-- table -->
  <rect x="130" y="130" width="140" height="10" rx="5" fill="#0A1F13" opacity=".8"/>
  <rect x="158" y="140" width="8" height="50" rx="4" fill="#0A1F13" opacity=".6"/>
  <rect x="234" y="140" width="8" height="50" rx="4" fill="#0A1F13" opacity=".6"/>
  <!-- plate 1 -->
  <ellipse cx="175" cy="128" rx="28" ry="10" fill="#fff" opacity=".8"/>
  <ellipse cx="175" cy="126" rx="20" ry="7" fill="#34D399" opacity=".6"/>
  <!-- plate 2 -->
  <ellipse cx="225" cy="128" rx="28" ry="10" fill="#fff" opacity=".8"/>
  <ellipse cx="225" cy="126" rx="20" ry="7" fill="#008A66" opacity=".5"/>
  <!-- glass -->
  <rect x="193" y="100" width="14" height="30" rx="4" fill="#34D399" opacity=".4"/>
  <rect x="193" y="100" width="14" height="8" rx="2" fill="#34D399" opacity=".3"/>
  <!-- candle -->
  <rect x="196" y="80" width="8" height="22" rx="3" fill="#fff" opacity=".7"/>
  <ellipse cx="200" cy="80" rx="4" ry="6" fill="#FBAA1A" opacity=".8"/>
  <!-- window -->
  <rect x="40" y="40" width="80" height="100" rx="8" fill="#fff" opacity=".3"/>
  <line x1="80" y1="40" x2="80" y2="140" stroke="#008A66" stroke-width="2" opacity=".4"/>
  <line x1="40" y1="90" x2="120" y2="90" stroke="#008A66" stroke-width="2" opacity=".4"/>
  <!-- hanging lamp -->
  <line x1="200" y1="0" x2="200" y2="50" stroke="#0A1F13" stroke-width="2" opacity=".4"/>
  <ellipse cx="200" cy="58" rx="22" ry="12" fill="#008A66" opacity=".8"/>
  <ellipse cx="200" cy="54" rx="16" ry="6" fill="#34D399" opacity=".5"/>

</svg>