<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bgauto1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F7F2"/>
      <stop offset="100%" style="stop-color:#C8EFE3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgauto1)" rx="16"/>
  
  <!-- road -->
  <rect x="0" y="170" width="400" height="40" fill="#0A1F13" opacity=".5" rx="0"/>
  <rect x="0" y="183" width="400" height="4" fill="#0A1F13" opacity=".3"/>
  <!-- dashes -->
  <rect x="40" y="185" width="40" height="4" rx="2" fill="#fff" opacity=".4"/>
  <rect x="120" y="185" width="40" height="4" rx="2" fill="#fff" opacity=".4"/>
  <rect x="200" y="185" width="40" height="4" rx="2" fill="#fff" opacity=".4"/>
  <rect x="280" y="185" width="40" height="4" rx="2" fill="#fff" opacity=".4"/>
  <!-- car body -->
  <rect x="80" y="120" width="240" height="60" rx="14" fill="#008A66" opacity=".85"/>
  <!-- car roof -->
  <path d="M130 120 Q160 80 240 80 Q280 80 300 120" fill="#008A66" opacity=".9"/>
  <path d="M138 120 Q165 86 238 86 Q275 86 293 120" fill="#34D399" opacity=".2"/>
  <!-- windows -->
  <rect x="150" y="88" width="60" height="34" rx="6" fill="#E6F7F2" opacity=".5"/>
  <rect x="218" y="88" width="60" height="34" rx="6" fill="#E6F7F2" opacity=".5"/>
  <!-- wheels -->
  <circle cx="140" cy="178" r="24" fill="#0A1F13" opacity=".8"/>
  <circle cx="140" cy="178" r="14" fill="#34D399" opacity=".4"/>
  <circle cx="140" cy="178" r="6" fill="#0A1F13" opacity=".6"/>
  <circle cx="260" cy="178" r="24" fill="#0A1F13" opacity=".8"/>
  <circle cx="260" cy="178" r="14" fill="#34D399" opacity=".4"/>
  <circle cx="260" cy="178" r="6" fill="#0A1F13" opacity=".6"/>
  <!-- headlight -->
  <ellipse cx="320" cy="148" rx="14" ry="10" fill="#34D399" opacity=".6"/>
  <!-- speed lines -->
  <line x1="30" y1="135" x2="72" y2="135" stroke="#34D399" stroke-width="3" opacity=".4" stroke-linecap="round"/>
  <line x1="20" y1="148" x2="72" y2="148" stroke="#34D399" stroke-width="2" opacity=".3" stroke-linecap="round"/>
  <line x1="35" y1="160" x2="72" y2="160" stroke="#34D399" stroke-width="2" opacity=".3" stroke-linecap="round"/>

</svg>